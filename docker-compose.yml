services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salonbelleza_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    ports:
      - "3003:3000"

volumes:
  postgres_data:
